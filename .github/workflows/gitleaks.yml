name: gitleaks

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    # If the secret isn't available (e.g., PR from a fork on a public repo), skip instead of failing.
    if: ${{ secrets.GITLEAKS_LICENSE != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
